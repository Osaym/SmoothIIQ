# run github actions on push to main branch

name: Create Release
on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Tag Name
        id: tag
        run: echo "tag_name=v$(TZ=America/New_York date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      # Optional: If you use npm/yarn to build your extension (e.g., React/Vue)
      # - name: Install and Build
      #   run: |
      #     npm install
      #     npm run build

      - name: Zip Extension
        run: |
          zip -r SmoothIIQ-${{ steps.tag.outputs.tag_name }}.zip \
            manifest.json \
            popup.html \
            popup.js \
            content.js \
            cache_interceptor.js \
            style.css \
            images \
            -x "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          files: SmoothIIQ-${{ steps.tag.outputs.tag_name }}.zip
          draft: false
          prerelease: false