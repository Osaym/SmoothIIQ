<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      background-color: #f8f9fa;
      margin: 0;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .brand {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2px;
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    
    .header {
      font-weight: 700;
      color: #2c3e50;
      font-size: 18px;
      letter-spacing: 0.2px;
      margin: 0;
    }

    .version {
      font-size: 11px;
      color: #94a3b8;
      margin-top: -2px;
    }

    .message {
      font-size: 14px;
      color: #555;
      line-height: 1.4;
      margin: 0;
    }
    
    .toggle-button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #10b981;
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
      margin-bottom: 8px;
    }
    
    .toggle-button:hover {
      background-color: #059669;
      transform: translateY(-1px);
    }
    
    .toggle-button.disabled {
      background-color: #ef4444;
      box-shadow: 0 2px 4px rgba(239, 68, 68, 0.2);
    }
    .toggle-button.disabled:hover { background-color: #dc2626; }
    
    /* Cache Control Section */
    .cache-control {
        width: 100%;
        background: #f1f5f9;
        border-radius: 8px;
        padding: 10px;
        box-sizing: border-box;
      border: 1px solid #e2e8f0;
    }

    .cache-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: left;
    }

    .cache-status {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 8px;
    }

    .refresh-button {
        width: 100%;
        padding: 8px;
        font-size: 12px;
        font-weight: 500;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: white;
        color: #334155;
        cursor: pointer;
        transition: all 0.2s;
    }

    .refresh-button:hover {
        background: #e2e8f0;
        border-color: #94a3b8;
    }
    
    /* Stats Table */
    .stats-table {
        width: 100%;
        margin-top: 10px;
        font-size: 13px;
        border-collapse: collapse;
    }
    
    .stats-table td {
        padding: 4px 0;
        border-bottom: 1px solid #e2e8f0;
        text-align: left;
    }
    
    .stats-table td:last-child {
        text-align: right;
        font-weight: 600;
        color: #2c3e50;
    }

    .stats-table tr:last-child td {
        border-bottom: none;
    }
    
    .room-selector {
        width: 100%;
        padding: 6px;
        margin-top: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 12px;
        color: #334155;
    }

    .footer {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 10px;
    }
    
    a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <img class="logo" src="images/icon.png" alt="SmoothIIQ logo" />
      <h1 class="header">SmoothIIQ</h1>
    </div>
    <div class="version">v1.19</div>
    <p class="message">You're all set!<br>SmoothIIQ is running!</p>
    
    <button id="toggleButton" class="toggle-button">Pause Optimization</button>
    
    <div class="cache-control">
      <div class="cache-title">Cache Control</div>
        <div id="cacheStatus" class="cache-status">Checking cache...</div>
        <button id="refreshButton" class="refresh-button">&#x21bb; Refresh Cache Now</button>

        <table class="stats-table">
            <tr>
                <td>Asset Statuses</td>
                <td id="stat-status">-</td>
            </tr>
            <tr>
                <td>Locations</td>
                <td id="stat-locations">-</td>
            </tr>
        </table>
        
        <select id="room-breakdown" class="room-selector">
            <option>Loading Rooms...</option>
        </select>
    </div>

    <div class="footer">
      Developed by <a href="https://osaym.com" target="_blank">Osaym Omar</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
